name: Prepare Website VNext RC 0.1.0 Commit

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

concurrency:
  group: prepare-website-vnext-rc-0.1.0
  cancel-in-progress: false

jobs:
  validate-and-prepare:
    if: github.head_ref == 'website-vnext-1.0'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: website-vnext-1.0
          fetch-depth: 0

      - name: Verify branch base has not drifted
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main website-vnext-1.0
          expected_main='deb2b387ea40e7607c3f29dff9740a74026d8235'
          actual_main="$(git rev-parse origin/main)"
          if [[ "$actual_main" != "$expected_main" ]]; then
            echo "::error::main drifted from $expected_main to $actual_main; refusing to apply the RC."
            exit 1
          fi

      - name: Reconstruct and verify RC package
        shell: bash
        run: |
          set -euo pipefail
          cat .github/rc-payload/part-*.b64 > /tmp/website-vnext-rc.b64
          for chunk in .github/rc-payload/remainder-*.hex; do
            xxd -r -p "$chunk"
          done >> /tmp/website-vnext-rc.b64
          base64 --decode /tmp/website-vnext-rc.b64 > /tmp/website-vnext-rc.zip
          echo 'ac66a545315836e028ec6857503cd259c58757a389920d35ecfe1ca3787bacfd  /tmp/website-vnext-rc.zip' | sha256sum -c -
          rm -rf /tmp/website-vnext-rc
          mkdir -p /tmp/website-vnext-rc
          unzip -q /tmp/website-vnext-rc.zip -d /tmp/website-vnext-rc

      - name: Apply consolidated RC 0.1.0
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r source_file; do
            relative_path="${source_file#/tmp/website-vnext-rc/}"
            case "$relative_path" in
              README.md|APPLY_INSTITUTIONAL_VISUAL_PASS.sh|MANIFEST.json)
                continue
                ;;
            esac
            mkdir -p "$(dirname "$relative_path")"
            cp "$source_file" "$relative_path"
          done < <(find /tmp/website-vnext-rc -type f | sort)
          rm -f src/components/CookieBanner.tsx
          rm -f src/lib/airtable.functions.ts
          chmod +x scripts/*.sh

      - name: Include Cloudflare worker declarations in TypeScript
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('tsconfig.json')
          text = path.read_text()
          needle = '"include": ["src/**/*.ts", "src/**/*.tsx", "vite.config.ts", "eslint.config.js"],'
          replacement = '"include": ["src/**/*.ts", "src/**/*.tsx", "vite.config.ts", "eslint.config.js", "worker-configuration.d.ts"],'
          if needle not in text:
              raise SystemExit('Expected tsconfig include line was not found.')
          path.write_text(text.replace(needle, replacement, 1))
          PY

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Regenerate text lockfile
        shell: bash
        run: |
          set -euo pipefail
          cat > bunfig.toml <<'EOF'
          [install]
          saveTextLockfile = true
          EOF
          rm -f bun.lock bun.lockb package-lock.json
          bun install
          test -f bun.lock

      - name: Release audit
        run: bun run audit:release

      - name: Separation scan
        run: bun run audit:separation

      - name: Standard build
        run: bun run build

      - name: Cloudflare build
        run: bun run build:cloudflare

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Create validated release commit object
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          rm -rf node_modules dist .output .wrangler .vite
          rm -rf .github/rc-payload
          rm -f .github/workflows/export-source.yml
          git add -A
          git diff --cached --check
          python3 <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request
          from pathlib import Path

          repo = os.environ['GH_REPOSITORY']
          token = os.environ['GH_TOKEN']
          head = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          api_root = f'https://api.github.com/repos/{repo}'

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  api_root + path,
                  data=data,
                  method=method,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'ravencourt-release-preparer',
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          base_commit = request('GET', f'/git/commits/{head}')
          base_tree = base_commit['tree']['sha']
          raw = subprocess.check_output(
              ['git', 'diff', '--cached', '--name-status', '--no-renames', '-z']
          )
          parts = raw.decode().split('\0')
          if parts and parts[-1] == '':
              parts.pop()
          if len(parts) % 2:
              raise SystemExit('Unexpected staged diff record format.')

          entries = []
          for index in range(0, len(parts), 2):
              status, path = parts[index], parts[index + 1]
              if status == 'D':
                  entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})
                  continue
              content = Path(path).read_bytes()
              blob = request(
                  'POST',
                  '/git/blobs',
                  {'content': base64.b64encode(content).decode(), 'encoding': 'base64'},
              )
              stage = subprocess.check_output(
                  ['git', 'ls-files', '--stage', '--', path], text=True
              ).strip()
              mode = stage.split()[0] if stage else '100644'
              entries.append({'path': path, 'mode': mode, 'type': 'blob', 'sha': blob['sha']})

          tree = request('POST', '/git/trees', {'base_tree': base_tree, 'tree': entries})
          commit = request(
              'POST',
              '/git/commits',
              {
                  'message': 'Apply Website VNext 1.0 RC 0.1.0',
                  'tree': tree['sha'],
                  'parents': [head],
              },
          )
          Path('/tmp/release-commit-sha.txt').write_text(commit['sha'] + '\n')
          print(f"Prepared commit {commit['sha']} with {len(entries)} changed paths.")
          PY

      - name: Upload prepared commit SHA
        uses: actions/upload-artifact@v4
        with:
          name: website-vnext-prepared-commit-${{ github.event.pull_request.head.sha }}
          path: /tmp/release-commit-sha.txt
          retention-days: 1
