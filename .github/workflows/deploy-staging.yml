name: Deploy Website Staging

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_DEPLOY_TOKEN }}

concurrency:
  group: ravencourt-website-staging
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref_name == 'website-vnext-1.0'
    environment: website-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run audit:release
      - run: bun run audit:separation
      - run: bun run deploy:staging
