name: RAAVEN Cloudflare Permission Audit

on:
  pull_request:
    paths:
      - ".github/workflows/raaven-cloudflare-permission-audit.yml"
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate read-only audit boundary
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/raaven-cloudflare-permission-audit.yml').read_text()
          for required in (
              '/audit-raaven-cloudflare-permissions',
              'github.event.issue.number == 14',
              'CLOUDFLARE_WEBSITE_DEPLOY_TOKEN',
              '/dns_records',
              '/workers/routes',
              '/workers/domains',
              'safe_read',
              'Post permission audit receipt',
          ):
              assert required in workflow, required
          for verb in ('POST', 'PUT', 'PATCH', 'DELETE'):
              forbidden = '--request ' + verb
              assert forbidden not in workflow, forbidden
          PY

  audit:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.number == 14 &&
      github.event.comment.body == '/audit-raaven-cloudflare-permissions' &&
      github.actor == 'rohakapo'
    environment: website-production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_DEPLOY_TOKEN }}
      CLOUDFLARE_API_BASE: https://api.cloudflare.com/client/v4
      ZONE_NAME: ravencourtcapital.com
      PUBLIC_HOSTNAME: raaven.ravencourtcapital.com
    steps:
      - name: Verify founder authority
        run: |
          set -euo pipefail
          test "${{ github.event.comment.user.login }}" = "rohakapo"
          case "${{ github.event.comment.author_association }}" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) exit 1 ;;
          esac

      - name: Audit Cloudflare permissions without mutation
        run: |
          set -u
          : "${CLOUDFLARE_API_TOKEN:?Website Cloudflare token is required}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Cloudflare account ID is required}"

          curl --silent --show-error --get \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --data-urlencode "name=$ZONE_NAME" \
            --data-urlencode "account.id=$CLOUDFLARE_ACCOUNT_ID" \
            --data-urlencode "status=active" \
            --data-urlencode "per_page=5" \
            --write-out '%{http_code}' \
            "$CLOUDFLARE_API_BASE/zones" --output zones.json > zones-http-code.txt || true

          ZONE_ID="$(python <<'PY'
          import json, os
          from pathlib import Path
          try:
              payload = json.loads(Path('zones.json').read_text())
          except Exception:
              print('')
              raise SystemExit(0)
          rows = payload.get('result', [])
          matches = [row for row in rows if row.get('name') == os.environ['ZONE_NAME']]
          print(matches[0]['id'] if payload.get('success') is True and len(matches) == 1 else '')
          PY
          )"
          export ZONE_ID

          if [[ -n "$ZONE_ID" ]]; then
            curl --silent --show-error --get \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --data-urlencode "name.exact=$PUBLIC_HOSTNAME" \
              --data-urlencode "match=all" \
              --data-urlencode "per_page=100" \
              --write-out '%{http_code}' \
              "$CLOUDFLARE_API_BASE/zones/$ZONE_ID/dns_records" --output dns.json > dns-http-code.txt || true

            curl --silent --show-error \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --write-out '%{http_code}' \
              "$CLOUDFLARE_API_BASE/zones/$ZONE_ID/workers/routes" --output routes.json > routes-http-code.txt || true
          else
            printf '000' > dns-http-code.txt
            printf '000' > routes-http-code.txt
            printf '{"success":false,"errors":[{"code":"zone-unavailable"}]}' > dns.json
            printf '{"success":false,"errors":[{"code":"zone-unavailable"}]}' > routes.json
          fi

          curl --silent --show-error \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --write-out '%{http_code}' \
            "$CLOUDFLARE_API_BASE/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/domains" --output domains.json > domains-http-code.txt || true

          python <<'PY' > permission-audit.json
          import json
          from pathlib import Path

          def safe_read(name):
              path = Path(name)
              if not path.exists():
                  return {'success': False, 'errors': [{'code': 'missing-response'}], '_parseable': False}
              try:
                  payload = json.loads(path.read_text())
              except Exception:
                  return {'success': False, 'errors': [{'code': 'non-json-response'}], '_parseable': False}
              payload['_parseable'] = True
              return payload

          def code(name):
              path = Path(name)
              return path.read_text().strip() if path.exists() else '000'

          zones = safe_read('zones.json')
          dns = safe_read('dns.json')
          routes = safe_read('routes.json')
          domains = safe_read('domains.json')
          result = {
              'contractVersion': 'raaven-cloudflare-permission-audit-v1.1',
              'zoneRead': zones.get('success') is True,
              'dnsRead': dns.get('success') is True,
              'routesRead': routes.get('success') is True,
              'workerDomainsRead': domains.get('success') is True,
              'zoneParseable': zones.get('_parseable') is True,
              'dnsParseable': dns.get('_parseable') is True,
              'routesParseable': routes.get('_parseable') is True,
              'workerDomainsParseable': domains.get('_parseable') is True,
              'zoneHttpCode': code('zones-http-code.txt'),
              'dnsHttpCode': code('dns-http-code.txt'),
              'routesHttpCode': code('routes-http-code.txt'),
              'workerDomainsHttpCode': code('domains-http-code.txt'),
              'zoneErrorCodes': [x.get('code') for x in zones.get('errors', [])],
              'dnsErrorCodes': [x.get('code') for x in dns.get('errors', [])],
              'routeErrorCodes': [x.get('code') for x in routes.get('errors', [])],
              'domainErrorCodes': [x.get('code') for x in domains.get('errors', [])],
              'mutationsAttempted': False,
          }
          print(json.dumps(result, indent=2))
          PY

      - name: Post permission audit receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -s permission-audit.json ]]; then
            summary="$(python <<'PY'
          import json
          from pathlib import Path
          x = json.loads(Path('permission-audit.json').read_text())
          print(f"zone-read={str(x['zoneRead']).lower()}({x['zoneHttpCode']}); dns-read={str(x['dnsRead']).lower()}({x['dnsHttpCode']}); routes-read={str(x['routesRead']).lower()}({x['routesHttpCode']}); worker-domains-read={str(x['workerDomainsRead']).lower()}({x['workerDomainsHttpCode']}); mutations=false")
          PY
            )"
          else
            summary="audit failed before a complete permission matrix was produced; mutations=false"
          fi
          gh issue comment 14 --repo "$GITHUB_REPOSITORY" --body \
            "RAAVEN Cloudflare permission audit: ${summary}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Retain non-secret audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raaven-cloudflare-permission-audit-${{ github.run_id }}
          path: permission-audit.json
          retention-days: 3
          if-no-files-found: warn
