name: RAAVEN Cloudflare Permission Audit

on:
  pull_request:
    paths:
      - ".github/workflows/raaven-cloudflare-permission-audit.yml"
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate zero-mutation audit boundary
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/raaven-cloudflare-permission-audit.yml').read_text()
          for required in (
              '/audit-raaven-cloudflare-permissions',
              'github.event.issue.number == 14',
              'CLOUDFLARE_WEBSITE_DEPLOY_TOKEN',
              '/dns_records',
              '/workers/routes',
              '/workers/domains',
              'jq -n',
              'Post permission audit receipt',
          ):
              assert required in workflow, required
          for verb in ('POST', 'PUT', 'PATCH', 'DELETE'):
              assert ('--request ' + verb) not in workflow
          PY

  audit:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.number == 14 &&
      github.event.comment.body == '/audit-raaven-cloudflare-permissions' &&
      github.actor == 'rohakapo'
    environment: website-production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_DEPLOY_TOKEN }}
      CLOUDFLARE_API_BASE: https://api.cloudflare.com/client/v4
      ZONE_NAME: ravencourtcapital.com
      PUBLIC_HOSTNAME: raaven.ravencourtcapital.com
    steps:
      - name: Verify founder authority
        run: |
          set -euo pipefail
          test "${{ github.event.comment.user.login }}" = "rohakapo"
          case "${{ github.event.comment.author_association }}" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) exit 1 ;;
          esac

      - name: Audit Cloudflare permissions without mutation
        run: |
          set -u
          : "${CLOUDFLARE_API_TOKEN:?Website Cloudflare token is required}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Cloudflare account ID is required}"

          call_get() {
            local outfile="$1"
            local codefile="$2"
            shift 2
            curl --silent --show-error "$@" \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --write-out '%{http_code}' \
              --output "$outfile" > "$codefile" || true
            test -s "$outfile" || printf '{}' > "$outfile"
            test -s "$codefile" || printf '000' > "$codefile"
          }

          call_get zones.json zones.code \
            --get \
            --data-urlencode "name=$ZONE_NAME" \
            --data-urlencode "account.id=$CLOUDFLARE_ACCOUNT_ID" \
            --data-urlencode "status=active" \
            --data-urlencode "per_page=5" \
            "$CLOUDFLARE_API_BASE/zones"

          ZONE_ID="$(jq -r --arg name "$ZONE_NAME" '
            if (type == "object" and .success == true) then
              ([.result[]? | select(.name == $name and .status == "active")][0].id // "")
            else "" end
          ' zones.json 2>/dev/null || true)"

          if [[ -n "$ZONE_ID" ]]; then
            call_get dns.json dns.code \
              --get \
              --data-urlencode "name.exact=$PUBLIC_HOSTNAME" \
              --data-urlencode "match=all" \
              --data-urlencode "per_page=100" \
              "$CLOUDFLARE_API_BASE/zones/$ZONE_ID/dns_records"

            call_get routes.json routes.code \
              "$CLOUDFLARE_API_BASE/zones/$ZONE_ID/workers/routes"
          else
            printf '{"success":false,"errors":[{"code":"zone-unavailable"}]}' > dns.json
            printf '{"success":false,"errors":[{"code":"zone-unavailable"}]}' > routes.json
            printf '000' > dns.code
            printf '000' > routes.code
          fi

          call_get domains.json domains.code \
            "$CLOUDFLARE_API_BASE/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/domains"

          success_of() {
            jq -r 'if (type == "object" and .success == true) then "true" else "false" end' "$1" 2>/dev/null || printf 'false'
          }
          errors_of() {
            jq -c 'if type == "object" then [.errors[]?.code] else ["non-object-json-response"] end' "$1" 2>/dev/null || printf '["non-json-response"]'
          }

          ZONE_READ="$(success_of zones.json)"
          DNS_READ="$(success_of dns.json)"
          ROUTES_READ="$(success_of routes.json)"
          DOMAINS_READ="$(success_of domains.json)"

          jq -n \
            --arg contractVersion "raaven-cloudflare-permission-audit-v2.0" \
            --argjson zoneRead "$ZONE_READ" \
            --argjson dnsRead "$DNS_READ" \
            --argjson routesRead "$ROUTES_READ" \
            --argjson workerDomainsRead "$DOMAINS_READ" \
            --arg zoneHttpCode "$(cat zones.code)" \
            --arg dnsHttpCode "$(cat dns.code)" \
            --arg routesHttpCode "$(cat routes.code)" \
            --arg workerDomainsHttpCode "$(cat domains.code)" \
            --argjson zoneErrorCodes "$(errors_of zones.json)" \
            --argjson dnsErrorCodes "$(errors_of dns.json)" \
            --argjson routeErrorCodes "$(errors_of routes.json)" \
            --argjson domainErrorCodes "$(errors_of domains.json)" \
            '{
              contractVersion: $contractVersion,
              zoneRead: $zoneRead,
              dnsRead: $dnsRead,
              routesRead: $routesRead,
              workerDomainsRead: $workerDomainsRead,
              zoneHttpCode: $zoneHttpCode,
              dnsHttpCode: $dnsHttpCode,
              routesHttpCode: $routesHttpCode,
              workerDomainsHttpCode: $workerDomainsHttpCode,
              zoneErrorCodes: $zoneErrorCodes,
              dnsErrorCodes: $dnsErrorCodes,
              routeErrorCodes: $routeErrorCodes,
              domainErrorCodes: $domainErrorCodes,
              mutationsAttempted: false
            }' > permission-audit.json

          jq -e '.mutationsAttempted == false' permission-audit.json >/dev/null

      - name: Post permission audit receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if jq -e . permission-audit.json >/dev/null 2>&1; then
            summary="$(jq -r '
              "zone-read=\(.zoneRead)(\(.zoneHttpCode)); " +
              "dns-read=\(.dnsRead)(\(.dnsHttpCode)); " +
              "routes-read=\(.routesRead)(\(.routesHttpCode)); " +
              "worker-domains-read=\(.workerDomainsRead)(\(.workerDomainsHttpCode)); mutations=false"
            ' permission-audit.json)"
          else
            summary="audit failed before a complete permission matrix was produced; mutations=false"
          fi
          gh issue comment 14 --repo "$GITHUB_REPOSITORY" --body \
            "RAAVEN Cloudflare permission audit: ${summary}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Retain non-secret audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raaven-cloudflare-permission-audit-${{ github.run_id }}
          path: permission-audit.json
          retention-days: 3
          if-no-files-found: warn
