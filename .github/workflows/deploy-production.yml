name: Deploy Website Production

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_DEPLOY_TOKEN }}
  CLOUDFLARE_ENV: production
  VITE_ENQUIRY_MODE: production
  VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
  AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}
  AIRTABLE_TABLE_NAME: ${{ vars.AIRTABLE_TABLE_NAME }}
  AIRTABLE_API_TOKEN: ${{ secrets.AIRTABLE_API_TOKEN }}
  TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

concurrency:
  group: ravencourt-website-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref_name == 'main'
    environment: website-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Release content audit
        run: bun run audit:release
      - name: Separation scan
        run: bun run audit:separation
      - name: Confirm production configuration
        shell: bash
        run: |
          test "${{ vars.ENQUIRY_MODE }}" = "production" || {
            echo "Production environment is not authorised for live enquiry transmission." >&2
            exit 1
          }
          test -n "$VITE_TURNSTILE_SITE_KEY" || {
            echo "Missing VITE_TURNSTILE_SITE_KEY." >&2
            exit 1
          }
          [[ "$AIRTABLE_BASE_ID" =~ ^app[A-Za-z0-9]{14}$ ]] || {
            echo "AIRTABLE_BASE_ID is missing or invalid." >&2
            exit 1
          }
          test -n "$AIRTABLE_TABLE_NAME" || {
            echo "Missing AIRTABLE_TABLE_NAME." >&2
            exit 1
          }
          test -n "$AIRTABLE_API_TOKEN" || {
            echo "Missing AIRTABLE_API_TOKEN." >&2
            exit 1
          }
          test -n "$TURNSTILE_SECRET_KEY" || {
            echo "Missing TURNSTILE_SECRET_KEY." >&2
            exit 1
          }
      - name: Build production candidate
        run: bun run build:cloudflare
      - name: Prepare encrypted first-deploy secrets
        shell: bash
        run: |
          umask 077
          python - <<'PY'
          import json
          import os

          with open('.wrangler-secrets.json', 'w', encoding='utf-8') as handle:
              json.dump(
                  {
                      'AIRTABLE_API_TOKEN': os.environ['AIRTABLE_API_TOKEN'],
                      'TURNSTILE_SECRET_KEY': os.environ['TURNSTILE_SECRET_KEY'],
                  },
                  handle,
              )
          PY
      - name: Deploy production Worker
        run: |
          bunx wrangler deploy --env production \
            --secrets-file .wrangler-secrets.json \
            --var "ENQUIRY_MODE:production" \
            --var "AIRTABLE_BASE_ID:${AIRTABLE_BASE_ID}" \
            --var "AIRTABLE_TABLE_NAME:${AIRTABLE_TABLE_NAME}"
      - name: Remove temporary secrets file
        if: always()
        run: rm -f .wrangler-secrets.json
