name: Deploy Website Production

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.*"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-production.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WEBSITE_DEPLOY_TOKEN }}
  CLOUDFLARE_ENV: production
  VITE_ENQUIRY_MODE: production
  VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
  AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}
  AIRTABLE_TABLE_NAME: ${{ vars.AIRTABLE_TABLE_NAME }}
  AIRTABLE_API_TOKEN: ${{ secrets.AIRTABLE_API_TOKEN }}
  TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

concurrency:
  group: ravencourt-website-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')
    environment: website-production
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Release content audit
        run: bun run audit:release
      - name: Separation scan
        run: bun run audit:separation
      - name: Confirm production configuration
        shell: bash
        run: |
          test "${{ vars.ENQUIRY_MODE }}" = "production" || {
            echo "Production environment is not authorised for live enquiry transmission." >&2
            exit 1
          }
          test -n "$VITE_TURNSTILE_SITE_KEY" || {
            echo "Missing VITE_TURNSTILE_SITE_KEY." >&2
            exit 1
          }
          [[ "$AIRTABLE_BASE_ID" =~ ^app[A-Za-z0-9]{14}$ ]] || {
            echo "AIRTABLE_BASE_ID is missing or invalid." >&2
            exit 1
          }
          test -n "$AIRTABLE_TABLE_NAME" || {
            echo "Missing AIRTABLE_TABLE_NAME." >&2
            exit 1
          }
          test -n "$AIRTABLE_API_TOKEN" || {
            echo "Missing AIRTABLE_API_TOKEN." >&2
            exit 1
          }
          test -n "$TURNSTILE_SECRET_KEY" || {
            echo "Missing TURNSTILE_SECRET_KEY." >&2
            exit 1
          }
      - name: Build production candidate
        run: bun run build:cloudflare
      - name: Prepare encrypted first-deploy secrets
        shell: bash
        run: |
          umask 077
          python - <<'PY'
          import json
          import os

          with open('.wrangler-secrets.json', 'w', encoding='utf-8') as handle:
              json.dump(
                  {
                      'AIRTABLE_API_TOKEN': os.environ['AIRTABLE_API_TOKEN'],
                      'TURNSTILE_SECRET_KEY': os.environ['TURNSTILE_SECRET_KEY'],
                  },
                  handle,
              )
          PY
      - name: Deploy production Worker
        run: |
          bunx wrangler deploy --env production \
            --secrets-file .wrangler-secrets.json \
            --var "ENQUIRY_MODE:production" \
            --var "AIRTABLE_BASE_ID:${AIRTABLE_BASE_ID}" \
            --var "AIRTABLE_TABLE_NAME:${AIRTABLE_TABLE_NAME}"
      - name: Remove temporary secrets file
        if: always()
        run: rm -f .wrangler-secrets.json
      - name: Verify public production content
        shell: bash
        run: |
          set -euo pipefail

          about_body="$(mktemp)"
          profile_body="$(mktemp)"
          verified=false

          for attempt in $(seq 1 18); do
            : > "$about_body"
            : > "$profile_body"

            about_status="$(curl --silent --show-error --location \
              --retry 2 --retry-delay 2 --retry-all-errors \
              --header 'Cache-Control: no-cache' \
              --output "$about_body" --write-out '%{http_code}' \
              "https://ravencourtcapital.com/about?deploy=${GITHUB_RUN_ID}")" || true

            profile_status="$(curl --silent --show-error --location \
              --retry 2 --retry-delay 2 --retry-all-errors \
              --header 'Cache-Control: no-cache' \
              --output "$profile_body" --write-out '%{http_code}' \
              "https://ravencourtcapital.com/team/mitul-gouni?deploy=${GITHUB_RUN_ID}")" || true

            if [[ "$about_status" == "200" && "$profile_status" == "200" ]] && \
               grep -Fq "Mitul Gouni" "$about_body" && \
               grep -Fq "Mitul Gouni" "$profile_body" && \
               grep -Fq "Columbia University" "$profile_body" && \
               ! grep -Fq "Columbia College" "$profile_body"; then
              verified=true
              break
            fi

            sleep 5
          done

          test "$verified" = true || {
            echo "Production content verification failed." >&2
            exit 1
          }
      - name: Post verified deployment receipt
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh issue comment 5 --repo "${{ github.repository }}"
          --body "Automatic production website deployment completed successfully from main at commit ${{ github.sha }}. Release audit, separation scan, production configuration, build, Cloudflare deployment and live apex content verification all passed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post fail-closed deployment receipt
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh issue comment 5 --repo "${{ github.repository }}"
          --body "Automatic production website deployment failed closed at commit ${{ github.sha }}. Review the run before retrying: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"